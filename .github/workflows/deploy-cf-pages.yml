name: Deploy — Cloudflare Pages (rald.cloud)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build rald-cloud (CF Pages)
        run: pnpm --filter @workspace/rald-cloud run build
        env:
          NODE_ENV: production
          BASE_PATH: /
          VITE_API_BASE_URL: https://api.rald.cloud

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy artifacts/rald-cloud/dist/public --project-name=rald-cloud --branch=${{ github.ref_name }}
          packageManager: npm

      - name: Validate deployment
        run: |
          echo "✓ Deployed to Cloudflare Pages"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
        continue-on-error: true
