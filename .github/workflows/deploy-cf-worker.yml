name: Deploy — Cloudflare Worker (api.rald.cloud)

on:
  push:
    branches: [main, master]
    paths:
      - 'artifacts/cf-worker/**'
      - '.github/workflows/deploy-cf-worker.yml'
  workflow_dispatch:

concurrency:
  group: deploy-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Hono Worker to api.rald.cloud
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type-check Worker
        run: pnpm --filter @workspace/cf-worker run build
        continue-on-error: true

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: artifacts/cf-worker
          command: deploy

      - name: Health check
        run: |
          sleep 8
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api.rald.cloud/health || echo "000")
          echo "api.rald.cloud /health → HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✓ Worker healthy"
          else
            echo "⚠ Worker not yet reachable (DNS propagation may take a moment)"
          fi
        continue-on-error: true
