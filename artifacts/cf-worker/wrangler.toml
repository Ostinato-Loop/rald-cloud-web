name = "rald-api"
main = "src/index.ts"
compatibility_date = "2025-05-27"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
APP_VERSION = "1.0.0"

# Production: api.rald.cloud
[[routes]]
pattern = "api.rald.cloud/*"
zone_name = "rald.cloud"

[env.staging]
name = "rald-api-staging"
vars = { ENVIRONMENT = "staging" }

[[env.staging.routes]]
pattern = "api-staging.rald.cloud/*"
zone_name = "rald.cloud"
