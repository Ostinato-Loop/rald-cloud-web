name = "rald-cloud-edge"
main = "src/index.ts"
compatibility_date = "2025-05-27"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
APP_VERSION = "1.1.0"

# Primary: rald.cloud internal API routes
[[routes]]
pattern = "rald.cloud/api/*"
zone_name = "rald.cloud"

# Product subdomains — serve per-product SSR HTML for Googlebot crawlability
[[routes]]
pattern = "payrald.rald.cloud/*"
zone_name = "rald.cloud"

[[routes]]
pattern = "raldtics.rald.cloud/*"
zone_name = "rald.cloud"

[[routes]]
pattern = "dunarald.rald.cloud/*"
zone_name = "rald.cloud"

[[routes]]
pattern = "dispatch.rald.cloud/*"
zone_name = "rald.cloud"

[[routes]]
pattern = "voice.rald.cloud/*"
zone_name = "rald.cloud"

[[routes]]
pattern = "business.rald.cloud/*"
zone_name = "rald.cloud"

[[routes]]
pattern = "silicon.rald.cloud/*"
zone_name = "rald.cloud"

# Manilla — intercepts 530 (dead origin) and serves maintenance redirect
[[routes]]
pattern = "manilla.rald.cloud/*"
zone_name = "rald.cloud"

[env.staging]
name = "rald-cloud-edge-staging"
vars = { ENVIRONMENT = "staging" }
