name = "rald-cloud-edge"
main = "src/index.ts"
compatibility_date = "2025-05-27"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
APP_VERSION = "1.0.0"

# Routes rald.cloud internal API — does NOT conflict with rald-api worker on api.rald.cloud
[[routes]]
pattern = "rald.cloud/api/*"
zone_name = "rald.cloud"

[env.staging]
name = "rald-cloud-edge-staging"
vars = { ENVIRONMENT = "staging" }

[[env.staging.routes]]
pattern = "api-staging.rald.cloud/*"
zone_name = "rald.cloud"
