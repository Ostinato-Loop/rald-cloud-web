    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "RALD",
      "legalName": "LILCKY STUDIO LIMITED",
      "url": "https://rald.cloud",
      "logo": "https://rald.cloud/rald-icon.png",
      "foundingDate": "2024",
      "description": "Africa's Digital Operating System — 11 integrated products covering identity, payments, messaging, commerce, education, logistics, voice AI, email infrastructure, savings, analytics and developer tools.",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "support@rald.cloud",
        "contactType": "customer support",
        "areaServed": "Africa",
        "availableLanguage": ["English", "Yoruba", "Hausa", "Igbo", "Swahili"]
      },
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "NG",
        "addressRegion": "Lagos"
      },
      "sameAs": [
        "https://twitter.com/raldcloud",
        "https://linkedin.com/company/rald"
      ]
    }
    </script>

    <!-- JSON-LD: WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "RALD.cloud",
      "url": "https://rald.cloud",
      "description": "Africa's Digital Operating System — 11 integrated products",
      "inLanguage": "en-NG",
      "publisher": {
        "@type": "Organization",
        "name": "LILCKY STUDIO LIMITED"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://rald.cloud/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: ItemList — All 11 RALD Products -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "RALD Product Suite",
      "description": "All 11 products in the RALD African digital ecosystem",
      "numberOfItems": 11,
      "itemListElement": [
        { "@type": "ListItem", "position": 1,  "name": "RALD ALIA — African Digital Identity",         "url": "https://rald.cloud/alia" },
        { "@type": "ListItem", "position": 2,  "name": "PayRald — African Payment Infrastructure",     "url": "https://rald.cloud/payrald" },
        { "@type": "ListItem", "position": 3,  "name": "Loop Business — African Social Commerce",     "url": "https://rald.cloud/loop" },
        { "@type": "ListItem", "position": 4,  "name": "Loop Messenger — Messaging with Payments",    "url": "https://rald.cloud/messenger" },
        { "@type": "ListItem", "position": 5,  "name": "RALD Elimu — School Management for Africa",   "url": "https://rald.cloud/elimu" },
        { "@type": "ListItem", "position": 6,  "name": "RALD Mail — African Email Delivery API",      "url": "https://rald.cloud/raldmail" },
        { "@type": "ListItem", "position": 7,  "name": "Loop Dispatch — African Delivery Routing",    "url": "https://rald.cloud/dispatch" },
        { "@type": "ListItem", "position": 8,  "name": "Loop Voice — African Language Voice AI",      "url": "https://rald.cloud/voice" },
        { "@type": "ListItem", "position": 9,  "name": "Raldtics — African Business Analytics",       "url": "https://rald.cloud/raldtics" },
        { "@type": "ListItem", "position": 10, "name": "DunaRald — Nigerian Savings and Investments",  "url": "https://rald.cloud/dunarald" },
        { "@type": "ListItem", "position": 11, "name": "GitRald — African Developer Infrastructure",   "url": "https://rald.cloud/gitrald" }
      ]
    }
    </script>
