<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>RALD.cloud — Africa's Digital Operating System</title>
    <meta name="description" content="Identity, payments, communications, education, logistics, voice infrastructure, AI and developer platforms — connected through one trust network. Africa's Digital Operating System by LILCKY STUDIO LIMITED." />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="keywords" content="RALD, RALD ALIA, PayRald, Loop, Loop Messenger, RALD Elimu, Loop Voice, Loop Dispatch, African identity, digital payments, Africa OS, Africa fintech, African developer platform" />
    <meta name="author" content="LILCKY STUDIO LIMITED" />
    <meta name="theme-color" content="#FF2E2E" />

    <!-- Open Graph -->
    <meta property="og:title" content="RALD.cloud — Africa's Digital Operating System" />
    <meta property="og:description" content="Identity, payments, communications, education, logistics, voice infrastructure, AI and developer platforms — connected through one trust network." />
    <meta property="og:url" content="https://rald.cloud" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RALD.cloud" />
    <meta property="og:locale" content="en_NG" />
    <meta property="og:image" content="https://rald.cloud/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="RALD.cloud — African Digital Commerce Ecosystem" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@raldcloud" />
    <meta name="twitter:creator" content="@raldcloud" />
    <meta name="twitter:title" content="RALD.cloud — African Digital Commerce Ecosystem" />
    <meta name="twitter:description" content="The complete African digital commerce ecosystem — Loop, PayRald, Raldtics, DunaRald, and more." />
    <meta name="twitter:image" content="https://rald.cloud/og-image.png" />
    <meta name="twitter:image:alt" content="RALD.cloud" />

    <!-- Canonical -->
    <link rel="canonical" href="https://rald.cloud" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "RALD",
      "legalName": "LILCKY STUDIO LIMITED",
      "url": "https://rald.cloud",
      "logo": "https://rald.cloud/og-image.png",
      "foundingDate": "2024",
      "description": "Africa's complete digital commerce ecosystem — payments, social commerce, analytics, entertainment and more.",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "support@rald.cloud",
        "contactType": "customer support",
        "areaServed": "NG",
        "availableLanguage": ["English"]
      },
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "NG",
        "addressRegion": "Lagos"
      },
      "sameAs": [
        "https://twitter.com/raldcloud",
        "https://linkedin.com/company/rald"
      ]
    }
    </script>

    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "RALD.cloud",
      "url": "https://rald.cloud",
      "description": "The complete African digital commerce ecosystem",
      "publisher": {
        "@type": "Organization",
        "name": "LILCKY STUDIO LIMITED"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://rald.cloud/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: ItemList of all products -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "RALD Product Suite",
      "description": "All products in the RALD African digital commerce ecosystem",
      "numberOfItems": 10,
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Loop", "url": "https://loop.rald.cloud" },
        { "@type": "ListItem", "position": 2, "name": "PayRald", "url": "https://payrald.rald.cloud" },
        { "@type": "ListItem", "position": 3, "name": "Raldtics", "url": "https://raldtics.rald.cloud" },
        { "@type": "ListItem", "position": 4, "name": "DunaRald", "url": "https://dunarald.rald.cloud" },
        { "@type": "ListItem", "position": 5, "name": "Loop Dispatch", "url": "https://dispatch.rald.cloud" },
        { "@type": "ListItem", "position": 6, "name": "Loop Messenger", "url": "https://messenger.rald.cloud" },
        { "@type": "ListItem", "position": 7, "name": "Loop Voice", "url": "https://voice.rald.cloud" },
        { "@type": "ListItem", "position": 8, "name": "RALD Identity", "url": "https://app.rald.cloud" },
        { "@type": "ListItem", "position": 9, "name": "GitRald", "url": "https://admin.rald.cloud" },
        { "@type": "ListItem", "position": 10, "name": "RALD Control Center", "url": "https://control.rald.cloud" }
      ]
    }
    </script>

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/rald-icon.png" />
    <link rel="shortcut icon" type="image/png" href="/rald-icon.png" />
    <link rel="apple-touch-icon" href="/rald-icon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
